<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arcane — Engineering Memory</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="_media/icon.png">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Arcane',
      repo: 'https://github.com/Edition-X/arcane',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        noData: 'No results.',
        paths: 'auto',
        placeholder: 'Search docs...'
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
      },
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
