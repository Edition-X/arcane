name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Cut release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for git-cliff and tag inspection

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.6.1/git-cliff-2.6.1-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --strip-components=1 -C /usr/local/bin git-cliff-2.6.1/git-cliff

      - name: Determine next version
        id: version
        run: |
          # Source of truth is git tags, not pyproject.toml.
          # This avoids needing to commit back to main (which branch protection blocks).
          LATEST_TAG=$(git tag --sort=-version:refname | grep '^v' | head -1 || echo "")
          echo "Latest tag: $LATEST_TAG"

          # Collect commits since last tag (or all commits if no tag yet)
          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s" | head -20)
            BASE="0.1.0"
            BETA_NUM=""
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --oneline --format="%s")
            CURRENT="${LATEST_TAG#v}"
            BASE=$(echo "$CURRENT" | sed 's/-beta\..*//')
            BETA_NUM=$(echo "$CURRENT" | grep -oP '(?<=-beta\.)\d+' || echo "")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since last release — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          if [ -n "$BETA_NUM" ]; then
            # Already in a beta series — just increment the beta number
            NEXT_VERSION="${BASE}-beta.$((BETA_NUM + 1))"
          else
            # No beta tag yet — determine bump type from conventional commits
            if echo "$COMMITS" | grep -qiE "^(feat|fix|perf|refactor|docs)(\(.+\))?!:"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
            echo "Bump type: $BUMP"

            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)

            case "$BUMP" in
              major) NEXT_VERSION="$((MAJOR + 1)).0.0-beta.1" ;;
              minor) NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0-beta.1" ;;
              patch) NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-beta.1" ;;
            esac
          fi

          echo "Next version: $NEXT_VERSION"
          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        if: steps.version.outputs.skip != 'true'
        run: |
          # Generates notes for just this release (unreleased commits since last tag)
          git-cliff --config cliff.toml \
            --tag "${{ steps.version.outputs.tag }}" \
            --unreleased --strip all \
            -o release-notes.md

      - name: Tag and push
        if: steps.version.outputs.skip != 'true'
        run: |
          # We only push a tag — never a commit to main.
          # Branch protection covers refs/heads/* but not refs/tags/*,
          # so this works without any bypass allowances or PATs.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if echo "$TAG" | grep -q "beta"; then
            PRE="--prerelease"
          else
            PRE=""
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            $PRE
